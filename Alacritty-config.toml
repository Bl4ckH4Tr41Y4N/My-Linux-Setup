[window]
padding = { x = 20, y = 20 }
dynamic_padding = true
decorations = "none"
# Opacity: 0.0 is invisible, 1.0 is opaque
opacity = 0.7 
blur = true

[font]
normal = { family = "JetBrainsMono Nerd Font", style = "Regular" }
bold = { family = "JetBrainsMono Nerd Font", style = "Bold" }
size = 12.0

[cursor]
style = { shape = "Beam", blinking = "Always" }
vi_mode_style = "Block"

[colors.primary]
background = "#000000"
foreground = "#ffffff"

[colors.cursor]
text = "#000000"
cursor = "#ffffff"

[colors.normal]
black =   "#1a1a1a"
red =     "#666666"
green =   "#888888"
yellow =  "#aaaaaa"
blue =    "#cccccc"
magenta = "#dddddd"
cyan =    "#eeeeee"
white =   "#ffffff"

[colors.bright]
black =   "#444444"
red =     "#777777"
green =   "#999999"
yellow =  "#bbbbbb"
blue =    "#dddddd"
magenta = "#eeeeee"
cyan =    "#f2f2f2"
white =   "#ffffff"

[scrolling]
history = 10000
multiplier = 3
