# --- Window Layout ---
remember_window_size  no
initial_window_width  950
initial_window_height 500
window_padding_width  20
confirm_os_window_close 0

# --- Look & Feel (Monochrome + Transparency) ---
background            #000000
foreground            #ffffff
background_opacity    0.7
background_blur       1

# Hide window decorations (title bar)
hide_window_decorations yes

# --- Cursor ---
cursor                #ffffff
cursor_text_color     #000000
cursor_shape          beam
cursor_blink_interval 0.5

# --- Fonts ---
font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        12.0

# --- Tabs (Minimalist Grey) ---
tab_bar_style        powerline
active_tab_foreground   #000000
active_tab_background   #ffffff
inactive_tab_foreground #cccccc
inactive_tab_background #1a1a1a

# --- Color Scheme (Grayscale) ---
# Black
color0 #1a1a1a
color8 #444444
# Red -> Dark Grey
color1 #666666
color9 #777777
# Green -> Mid Grey
color2 #888888
color10 #999999
# Yellow -> Light Grey
color3 #aaaaaa
color11 #bbbbbb
# Blue -> Soft White
color4 #cccccc
color12 #dddddd
# Magenta -> Grey-White
color5 #dddddd
color13 #eeeeee
# Cyan -> Pure White
color6 #eeeeee
color14 #f2f2f2
# White
color7 #ffffff
color15 #ffffff
